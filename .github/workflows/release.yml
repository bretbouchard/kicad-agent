name: Release macOS App

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      lane:
        description: "Fastlane lane to run"
        required: true
        default: "build"
        type: choice
        options:
          - build
          - build_release
          - build_daemon
          - snapshot
          - beta
          - release

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          working-directory: ${{ github.workspace }}
          bundler-cache: true

      - name: Set up Python (for daemon build)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install fastlane
        run: bundle install

      # Lane-specific build
      - name: Run fastlane lane
        env:
          # Required env vars for the lane (set in repo secrets)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          ITC_TEAM_ID: ${{ secrets.ITC_TEAM_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_FILEPATH: ${{ secrets.APP_STORE_CONNECT_API_KEY_FILEPATH }}
        run: |
          LANE=${{ github.event.inputs.lane || 'build' }}
          if [ -z "$LANE" ]; then
            LANE=build
          fi
          bundle exec fastlane mac $LANE

      - name: Upload .app.zip
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: |
            build/*.app
            build/*.pkg
            build/*.zip
          if-no-files-found: warn
          retention-days: 14

      - name: Upload daemon
        if: success() && (github.event.inputs.lane == 'build_daemon' || startsWith(github.ref, 'refs/tags/'))
        uses: actions/upload-artifact@v4
        with:
          name: kicad-agent-daemon
          path: kicad_agent-0.1.0/dist/kicad-agent-daemon
          if-no-files-found: warn
          retention-days: 14

      - name: Upload screenshots
        if: success() && (github.event.inputs.lane == 'snapshot' || startsWith(github.ref, 'refs/tags/'))
        uses: actions/upload-artifact@v4
        with:
          name: app-store-screenshots
          path: fastlane/screenshots
          if-no-files-found: warn
          retention-days: 14
