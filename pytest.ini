# pytest.ini — Phase 199 Python Daemon Testing Configuration
#
# 100% coverage enforcement + mutation testing config.
# TEST-10: CI coverage gates for Python daemon.

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --cov=src/kicad_agent
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=80
    --strict-markers
    --tb=short
    -ra
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    daemon: marks tests requiring daemon subprocess
    network: marks tests requiring network access
    mutmut: marks tests suitable for mutation testing
filterwarnings =
    error
    ignore::DeprecationWarning:skidl.*
    ignore::DeprecationWarning:spicelib.*

[coverage:run]
source = src/kicad_agent
omit =
    */tests/*
    */__pycache__/*
    */__init__.py
    */conftest.py
branch = True

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    raise NotImplementedError
    @abstractmethod
show_missing = True
skip_covered = False

[mypy]
python_version = 3.11
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
ignore_missing_imports = true
