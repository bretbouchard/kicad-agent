# Volta PCB — XcodeGen Project
#
# Generates VoltaPCB.xcodeproj for xcodebuild archive / fastlane gym.
# The SPM Package.swift stays for fast `swift test` dev iteration.
# This project is for shipping: signed .app bundles, archives, TestFlight.
#
# Usage: cd macos-app && xcodegen generate
#
# Dev team 68SDK93S22 from White Room + keychain signing identities.
# macOS 27.0 target — FoundationModels + Liquid Glass requirement
# (only macOS 26.5 SDK installed; unsafeFlags force the 27.0 ABI target,
#  same approach as Package.swift).

name: VoltaPCB
options:
  bundleIdPrefix: com.bretbouchard
  developmentTeam: "68SDK93S22"
  defaultConfig: Debug
  configs:
    Debug:
      type: debugging
    Release:
      type: release
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.2"
    SWIFT_STRICT_CONCURRENCY: minimal
    DEVELOPMENT_TEAM: "68SDK93S22"
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    # Release uses manual signing for App Store distribution via fastlane.
    # Debug keeps automatic signing for dev builds.
    CODE_SIGN_IDENTITY[config=Release]: "Apple Distribution"
    CODE_SIGN_STYLE[config=Release]: Manual
    GCC_NO_COMMON_BLOCKS: YES
    # Explicit module builds fail to resolve C module deps (Cmlx, _NumericsShims)
    # from SPM packages. The implicit module system (used by swift build) works.
    SWIFT_USE_INTEGRATED_DRIVER: YES
    SWIFT_ENABLE_EXPLICIT_MODULES: NO
    # swift-testing (import Testing) lives in the developer frameworks, not
    # the OS SDK. The Testing/ source group uses it for test-infrastructure
    # helpers compiled into the app target (same as SPM).
    FRAMEWORK_SEARCH_PATHS: "$(inherited) $(PLATFORM_DIR)/Developer/Library/Frameworks"

packages:
  # Local fork: gates the CudaBuild plugin on MLX_BUILD_CUDA so macOS
  # builds don't try to validate the nvcc-dependent buildTool plugin.
  # Keep in sync with https://github.com/ml-explore/mlx-swift at 0.31.6.
  MLXSwift:
    path: /Users/bretbouchard/apps/mlx-swift
  MLXSwiftLM:
    url: https://github.com/ml-explore/mlx-swift-lm
    from: "3.31.4"
  SwiftTransformers:
    url: https://github.com/huggingface/swift-transformers
    from: "1.3.3"
  SwiftHuggingFace:
    url: https://github.com/huggingface/swift-huggingface
    from: "0.1.0"

targets:
  # ===========================================================================
  # VoltaPCB — macOS 27 Liquid Glass app
  # ===========================================================================
  VoltaPCB:
    type: application
    platform: macOS
    deploymentTarget:
      macOS: "27.0"
    sources:
      - path: Sources/Volta
        excludes:
          # require the TestingMacros compiler plugin — not available in an
          # app target build. These compile fine under SPM (toolchain provides
          # the plugin) and are included in VoltaTests below.
          - "Testing/**"
      - path: Resources/Assets.xcassets
      - path: Resources/AppIcon.icns
        buildPhase: resources
      - path: Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
        buildPhase: resources
      - path: Resources/Volta.entitlements
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bretbouchard.volta
        PRODUCT_NAME: Volta PCB
        # SDK max is 26.5.99. Setting 27.0 emits a warning but produces a
        # binary that refuses to launch on macOS 26. When Xcode 27 SDK lands,
        # this becomes clean. The Package.swift uses unsafeFlags for this; we
        # use the deployment target directly to keep explicit module build
        # (Cmlx, _NumericsShims) consistent across all targets.
        MACOSX_DEPLOYMENT_TARGET: "27.0"
        # Hardened runtime required for distribution.
        ENABLE_HARDENED_RUNTIME: YES
        # Auto-generated Info.plist with deployment target.
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Resources/Info.plist
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_ENTITLEMENTS: Resources/Volta.entitlements
        MARKETING_VERSION: "6.0.0"
        CURRENT_PROJECT_VERSION: "1"
    postBuildScripts:
      - name: Copy + Sign Bundled Daemon
        # Copies the stripped PyInstaller daemon (82MB) into Contents/Resources/
        # and signs every Mach-O for App Store sandbox compliance.
        # Daemon is built separately: cd daemon && pyinstaller --noconfirm volta-daemon.spec
        runOnlyWhenInstalling: false
        script: |
          set -e
          DAEMON_SRC="${PROJECT_DIR}/daemon/dist/volta-daemon"
          RESOURCES_DIR="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources"
          DAEMON_DEST="${RESOURCES_DIR}/volta-daemon"
          mkdir -p "$RESOURCES_DIR"
          if [ ! -d "$DAEMON_SRC" ]; then
            echo "Daemon not built at $DAEMON_SRC — skipping (dev build without daemon)"
            exit 0
          fi
          rm -rf "$DAEMON_DEST"
          cp -R "$DAEMON_SRC" "$DAEMON_DEST"
          chmod +x "$DAEMON_DEST/volta-daemon"
          # Ad-hoc sign every Mach-O in the daemon bundle.
          # The outer .app signing (by Xcode's CodeSign phase) covers
          # the real distribution identity. Individual .so/.dylib just
          # need a valid signature for sandbox validation.
          find "$DAEMON_DEST" -type f \( -name "*.so" -o -name "*.dylib" -o -name "*.pyd" \) | while read -r lib; do
            codesign --force --sign - --options runtime "$lib" 2>/dev/null || true
          done
          codesign --force --sign - --options runtime \
            --entitlements "${PROJECT_DIR}/daemon/daemon-sandbox.entitlements" \
            "$DAEMON_DEST/volta-daemon"
          echo "Daemon copied + ad-hoc signed"
    dependencies:
      - package: MLXSwift
        product: MLX
      - package: MLXSwift
        product: MLXNN
      - package: MLXSwiftLM
        product: MLXLLM
      - package: MLXSwiftLM
        product: MLXLMCommon
      - package: MLXSwiftLM
        product: MLXHuggingFace
      - package: SwiftTransformers
        product: Tokenizers
      - package: SwiftHuggingFace
        product: HuggingFace

  # ===========================================================================
  # VoltaPCBTests — unit tests (swift-testing framework)
  # ===========================================================================
  VoltaPCBTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget:
      macOS: "27.0"
    sources:
      - path: Tests/VoltaTests
      # Include the test-infrastructure helpers (swift-testing macros).
      # Excluded from the app target because the TestingMacros plugin
      # is unavailable there.
      - path: Sources/Volta/Testing
    dependencies:
      - target: VoltaPCB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bretbouchard.volta.tests
        PRODUCT_NAME: VoltaPCBTests
        MACOSX_DEPLOYMENT_TARGET: "27.0"
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Volta PCB.app/Contents/MacOS/Volta PCB"

# ============================================================================
# Schemes
# ============================================================================
schemes:
  VoltaPCB:
    build:
      targets:
        VoltaPCB: all
    run:
      config: Debug
    archive:
      config: Release
  VoltaPCBTests:
    build:
      targets:
        VoltaPCBTests: all
    test:
      config: Debug
      targets:
        - VoltaPCBTests
